[project]
name = "lub-memory"
version = "0.0.0"
description = "let-us-build — own memory subsystem (tiered, Postgres+pgvector). No Node sidecar."
requires-python = ">=3.12"
dependencies = ["lub-store"]  # pgvector/embeddings added in M6 (LUB-060)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lub_memory"]
