[project]
name = "lub-improvement"
version = "0.0.0"
description = "let-us-build — sia-inspired self-improvement (harness lever): lessons + verifiers."
requires-python = ">=3.12"
dependencies = ["lub-store", "lub-memory"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lub_improvement"]
