[project]
name = "lub-api"
version = "0.0.0"
description = "let-us-build — core API (FastAPI): REST + WebSocket gateway + orchestrator host."
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "pydantic-settings>=2.4",
  "lub-store",
  "lub-llm",
  "lub-agents",
]
# lub-orchestrator is wired in from M4 onward.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lub_api"]
