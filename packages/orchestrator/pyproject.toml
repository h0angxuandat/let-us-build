[project]
name = "lub-orchestrator"
version = "0.0.0"
description = "let-us-build — LangGraph orchestration: ticket graph, scheduler, lanes, discussion."
requires-python = ">=3.12"
dependencies = ["lub-store", "lub-agents"]  # langgraph added in M4 (LUB-040)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lub_orchestrator"]
