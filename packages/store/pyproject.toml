[project]
name = "lub-store"
version = "0.0.0"
description = "let-us-build — persistence & domain kernel (models, repositories, shared enums)."
requires-python = ">=3.12"
dependencies = [
  "sqlalchemy[asyncio]>=2.0",
  "alembic>=1.13",
  "asyncpg>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lub_store"]
