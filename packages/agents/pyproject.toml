[project]
name = "lub-agents"
version = "0.0.0"
description = "let-us-build — the six role agents (BA/Designer/TechLead/Dev/QE/PM) + skills."
requires-python = ">=3.12"
dependencies = ["lub-store", "lub-llm", "lub-memory"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lub_agents"]
